<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ola — Multidisciplinary Designer</title>
  <script>
    (function () {
      var img = new Image();
      img.onload = function () {
        var c = document.createElement('canvas');
        c.width = c.height = 64;
        var ctx = c.getContext('2d');
        ctx.beginPath();
        ctx.arc(32, 32, 32, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(img, 0, 0, 64, 64);
        var link = document.querySelector("link[rel='icon']") || document.createElement('link');
        link.rel = 'icon';
        link.href = c.toDataURL();
        document.head.appendChild(link);
      };
      img.src = '/image/Me.jpg';
    })();
  </script>
  <!-- DNS + TLS handshake done early for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Non-blocking font load — text renders immediately in fallback, swaps when ready -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hepta+Slab:wght@100..900&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hepta+Slab:wght@100..900&display=swap"
      rel="stylesheet">
  </noscript>
  <!-- Component CSS loaded here so it's ready before the fetch completes -->
  <link rel="stylesheet" href="/components/nav/nav.css">
  <link rel="stylesheet" href="/components/footer/footer.css">
  <link rel="stylesheet" href="/portfolio.css">
  <!-- Hero image is above the fold — start fetching immediately -->
  <link rel="preload" as="image" href="/image/Me.jpg">
</head>

<body>

  <div id="nav-component"></div>

  <main class="main-wrap">

    <!-- Hero -->
    <section class="hero">
      <div class="img-text">
        <div class="hero-avatar-wrap">
          <img class="avatar-card avatar-card--left" src="image/Me.jpg" alt="" aria-hidden="true" />
          <img class="avatar-card avatar-card--right" src="image/Me.jpg" alt="" aria-hidden="true" />
          <div class="hero-avatar">
            <img src="image/Me.jpg" alt="Sulaimon Odeniran" />
          </div>
        </div>
        <div class="hero-text">
          <h1 class="hero-heading">
            I'm <span class="muted">Ola</span>,<br>
            a Multidisciplinary Designer.
          </h1>
          <p class="hero-bio">
            With 3+ years in UI/UX, brand design, Webflow, and Framer, I craft digital experiences for clients and
            thrive
            on learning and growing with fellow creatives.
          </p>
        </div>
      </div>
      <a href="mailto:odeniransulaimon18@gmail.com" class="btn-primary">
        Work With Me
        <img src="image/Icons/Arrow.svg" alt="" class="btn-arrow" />
      </a>
    </section>

  </main>

  <!-- Work Carousel (full-width, outside main-wrap) -->
  <section class="carousel-wrap">
    <div class="carousel-track">
      <div class="work-card">
        <img src="/image/Work card 1.jpg" alt="Project 1" loading="lazy" />
      </div>
      <div class="work-card">
        <img src="/image/Work card 2.png" alt="Project 2" loading="lazy" />
      </div>
      <div class="work-card">
        <img src="/image/Work card 1.jpg" alt="Project 3" loading="lazy" />
      </div>
      <div class="work-card">
        <img src="/image/Work card 1.jpg" alt="Project 4" loading="lazy" />
      </div>
      <div class="work-card">
        <img src="/image/Work card 1.jpg" alt="Project 5" loading="lazy" />
      </div>
      <div class="work-card">
        <img src="/image/Work card 1.jpg" alt="Project 6" loading="lazy" />
      </div>
      <!-- duplicate set for seamless loop -->
      <div class="work-card" aria-hidden="true">
        <img src="/image/Work card 1.jpg" alt="" loading="lazy" />
      </div>
      <div class="work-card" aria-hidden="true">
        <img src="/image/Work card 1.jpg" alt="" loading="lazy" />
      </div>
      <div class="work-card" aria-hidden="true">
        <img src="/image/Work card 1.jpg" alt="" loading="lazy" />
      </div>
      <div class="work-card" aria-hidden="true">
        <img src="/image/Work card 1.jpg" alt="" loading="lazy" />
      </div>
      <div class="work-card" aria-hidden="true">
        <img src="/image/Work card 1.jpg" alt="" loading="lazy" />
      </div>
      <div class="work-card" aria-hidden="true">
        <img src="image/Work card 1.jpg" alt="" />
      </div>
    </div>
  </section>

  <div id="footer-component"></div>

  <script src="/scripts/transitions.js"></script>
  <script src="/components/footer/footer.js"></script>
  <script src="/components/nav/nav.js"></script>
  <script>
    function loadComponent(id, path, callback) {
      fetch(path)
        .then(r => r.text())
        .then(html => {
          document.getElementById(id).innerHTML = html;
          if (callback) callback();
        });
    }

    loadComponent('nav-component', '/components/nav/nav.html', initNav);
    loadComponent('footer-component', '/components/footer/footer.html', startWATClock);
  </script>

</body>

</html>
